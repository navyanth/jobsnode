services:
  - type: web
    name: job-monitor-node
    env: node
    rootDir: node-app
    buildCommand: npm install && npx playwright install chromium --with-deps
    startCommand: node server.js
    envVars:
      - key: APPS_SCRIPT_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: EMAIL_ENABLED
        value: "true"
      - key: EMAIL_SENDER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_RECIPIENT
        sync: false
